# Deploy the web app from the monorepo
[build]
base = "apps/web"
command = "npm run build"
publish = "build/client"

# SPA/React Router: serve index.html for all routes so client-side routing works
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
base = "apps/web"
command = "npm run dev"
